name: CI/CD Pipeline

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'
      - run: npm install
      - run: npm test

  load-test:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - run: npm install
      - run: |
          node ./bin/www &
          sleep 10
      - name: Install k6
        run: |
          curl -s https://api.github.com/repos/grafana/k6/releases/latest \
          | grep "browser_download_url.*linux-amd64" \
          | cut -d '"' -f 4 \
          | wget -qi -
          tar -xzf k6-v*-linux-amd64.tar.gz
          sudo mv k6-v*-linux-amd64/k6 /usr/local/bin/k6
      - name: Run k6 cloud test
        run: k6 run --out cloud k6/loadtest.js
        env:
          K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN_TATTOO }}
          K6_CLOUD_PROJECT_ID: ${{ secrets.K6_PROJECT_ID_TATTOO }}

  sonarqube-analysis:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies and run tests with coverage
        run: |
          npm install
          npm test

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_TATTOO }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL_TATTOO }}
        with:
          args: >
            -Dsonar.projectKey=tattoo-bluegreen
            -Dsonar.projectName=Tattoo-BlueGreen
            -Dsonar.sources=app
            -Dsonar.tests=tests
            -Dsonar.test.inclusions=tests/**/*.test.js
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.qualitygate.wait=true

  build-and-push:
    runs-on: ubuntu-latest
    needs: [test, load-test, sonarqube-analysis]
    permissions:
      contents: read
      packages: write
    outputs:
      image_name: ${{ steps.lowercase.outputs.image_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image name
        id: lowercase
        run: echo "image_name=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ steps.lowercase.outputs.image_name }}:main

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Update repo on docker-vm
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DOCKER_TATTOO_HOST }}
          username: ${{ secrets.TATTOO_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          proxy_host: ${{ secrets.BASTION_TATTOO_HOST }}
          proxy_username: ${{ secrets.TATTOO_USER }}
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}
          proxy_passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            cd /home/tattoo-bluegreen
            sudo git fetch origin main
            sudo git reset --hard origin/main

      - name: Detect and export environments
        run: |
          RESPONSE=$(curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/variables/CURRENT_ENV")
          CURRENT=$(echo "$RESPONSE" | grep -o '"value":"[^"]*"' | cut -d'"' -f4)
          CURRENT=${CURRENT:-blue}

          if [ "$CURRENT" = "blue" ]; then
            NEXT="green"
          else
            NEXT="blue"
          fi

          echo "CURRENT_ENV=$CURRENT" >> $GITHUB_ENV
          echo "NEXT_ENV=$NEXT" >> $GITHUB_ENV
          echo "Detected CURRENT=$CURRENT -> deploying to NEXT=$NEXT"

      - name: Deploy new container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DOCKER_TATTOO_HOST }}
          username: ${{ secrets.TATTOO_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          proxy_host: ${{ secrets.BASTION_TATTOO_HOST }}
          proxy_username: ${{ secrets.TATTOO_USER }}
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}
          proxy_passphrase: ${{ secrets.SSH_PASSPHRASE }}
          envs: NEXT_ENV,CURRENT_ENV
          script: |
            echo ">> Deploying NEXT=$NEXT_ENV  CURRENT=$CURRENT_ENV"
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            docker pull ghcr.io/${{ needs.build-and-push.outputs.image_name }}:main
            cd /home/tattoo-bluegreen
            docker-compose stop app_${NEXT_ENV} || true
            docker-compose rm -f app_${NEXT_ENV} || true
            DEPLOY_ENV=${NEXT_ENV} docker-compose up -d --no-deps --build app_${NEXT_ENV}

      - name: Switch Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.NGINX_TATTOO_HOST }}
          username: ${{ secrets.TATTOO_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          proxy_host: ${{ secrets.BASTION_TATTOO_HOST }}
          proxy_username: ${{ secrets.TATTOO_USER }}
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}
          proxy_passphrase: ${{ secrets.SSH_PASSPHRASE }}
          envs: NEXT_ENV,CURRENT_ENV
          script: |
            echo ">> Switching nginx: $CURRENT_ENV -> $NEXT_ENV"
            sudo sed -i "s|proxy_pass http://app_${CURRENT_ENV};|proxy_pass http://app_${NEXT_ENV};|" \
              /etc/nginx/sites-available/default
            sudo systemctl reload nginx
            sleep 7
            if ! curl -f http://34.51.83.32/health; then
              echo "Healthcheck falló, rollback a $CURRENT_ENV..."
              sudo sed -i "s|proxy_pass http://app_${NEXT_ENV};|proxy_pass http://app_${CURRENT_ENV};|" \
                /etc/nginx/sites-available/default
              sudo systemctl reload nginx
              exit 1
            fi

      - name: Deploy monitoring stack
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DOCKER_TATTOO_HOST }}
          username: ${{ secrets.TATTOO_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          proxy_host: ${{ secrets.BASTION_TATTOO_HOST }}
          proxy_username: ${{ secrets.TATTOO_USER }}
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}
          proxy_passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            cd /home/tattoo-bluegreen
            docker-compose -f docker-compose.prom.yml up -d

      - name: Update current env variable
        if: success()
        run: |
          curl -s -X PATCH \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/variables/CURRENT_ENV" \
            -d "{\"name\":\"CURRENT_ENV\",\"value\":\"${{ env.NEXT_ENV }}\"}"
